<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI với Gemini</title>
    <link rel="stylesheet" href="aigemini.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex justify-center items-center min-h-screen p-4">
 
    <div class="chat-container bg-white">
        <div class="chat-header p-2 bg-emerald-300 text-white text-center rounded-t-2xl">
            <h3 class="text-x1 font-bold">Trò chuyện</h3>
        </div>
        <div class="chat-messages" id="chat-messages">
        </div>
        <div class="chat-input-container p-4 bg-gray-50 border-t border-gray-200 flex items-center gap-2">
            <input type="text" id="user-input" placeholder="Nhập tin nhắn của bạn..." class="flex-grow p-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <button id="send-button" class="bg-emerald-500 hover:bg-emerald-600 text-white p-3 rounded-full transition-colors duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </div>
    <script src="aigemini.js"></script>
</body>
</html>
