<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tân</title>
    <link rel="icon" href="logo.png"/>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        .layout {
            display: flex;
            height: 100%;
            position: relative;
        }
        .sidebar {
            width: auto;
            background-color: #f6eadc;
            color: black;
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            transform: translateX(-100%);
            z-index: 1001;
            position: fixed;
            height: 100%;
            top: 0;
            left: 0;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar {
            display: none;
        }
        .sidebar.show {
            transform: translateX(0);
        }
        .sidebar button {
            padding: 12px 12px;
            background: none;
            border: none;
            text-align: left;
            color: black;
            font-size: 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .sidebar button:hover {
            background-color: #aff8e2;
            color: red;
        }
        .sidebar button.active {
            background-color: #e6f9f4;
            color: red;
            font-weight: bold;
            border-radius: 6px;
        }
        .sidebar details {
            padding: 8px 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .sidebar details.active-parent > summary {
            color: red;
            font-weight: bold;
            background-color: #fff0f0;
            border-radius: 6px;
            padding: 8px 10px;
        }
        .sidebar details {
            display: block;
        }
        .sidebar details > button {
            display: block;
            width: 100%;
            box-sizing: border-box;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            display: none;
        }
        .overlay.show {
            display: block;
        }
        .content {
            flex-grow: 1;
            width: 100%;
            margin-left: 0;
            height: 100%;
        }
        .clock-container {
            text-align: center;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .clock {
            font-size: 15px;
            color: black;
            margin-right: 10px;
        }
        .date {
            font-size: 15px;
            color: black;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: red;
            font-size: 20px;
            padding: 5px 20px;
            cursor: pointer;
            z-index: 1002;
            position: fixed;
            top: 0px;
            left: 0px;
        }
        .toggle-btn.hide {
            display: none;
            font-size: 2px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #search-input {
            width: 90%;
            padding: 10px;
            margin: 10px auto;
            display: block;
            box-sizing: border-box;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .logout-btn {
            position: sticky;
            bottom: 0;
            margin-top: auto;
            background-color: #ff6347;
            color: white;
            font-weight: bold;
            border-radius: 0;
        }
        .logout-btn:hover {
            background-color: #e55333;
        }
    </style>
</head>
